<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LadzVault73 — Auction Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1a0f;--bg2:#0a150c;--card:#122214;
    --gold:#c9a227;--text:#f0ede4;--muted:#888;
    --dim:#444;--border:#1e3320;
    --green:#4caf72;--orange:#e8a838;--red:#e05252;
  }
  body{
    background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;padding-bottom:40px;
  }

  /* HEADER */
  header{
    background:var(--bg2);border-bottom:2px solid var(--gold);
    padding:14px 20px;display:flex;justify-content:space-between;
    align-items:center;position:sticky;top:0;z-index:50;
  }
  .logo{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:1px}
  .subtitle{font-size:10px;color:var(--muted);margin-top:1px}
  #newBtn{
    background:var(--gold);color:var(--bg2);border:none;
    border-radius:8px;padding:9px 16px;font-weight:700;
    font-size:14px;cursor:pointer;
  }

  /* TABS */
  .tabs{
    display:flex;background:var(--bg2);
    border-bottom:1px solid var(--border);
  }
  .tab{
    flex:1;padding:10px 0;background:none;border:none;
    color:var(--dim);font-size:13px;font-weight:600;
    cursor:pointer;border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  /* STATS BAR */
  #statsBar{
    display:flex;gap:0;background:var(--bg2);
    border-bottom:1px solid var(--border);
  }
  .stat{
    flex:1;padding:8px 12px;text-align:center;
    border-right:1px solid var(--border);
  }
  .stat:last-child{border-right:none}
  .stat-val{font-size:18px;font-weight:800;color:var(--gold)}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

  /* GRID */
  #grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:12px;
  }
  @media(max-width:800px){ #grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:400px){ #grid{grid-template-columns:repeat(2,1fr);gap:7px;padding:8px} }

  .empty{
    grid-column:1/-1;text-align:center;
    color:var(--dim);padding:50px 0;font-size:14px;
  }

  /* CARD */
  .card{
    background:var(--card);border:1.5px solid var(--green);
    border-radius:10px;padding:10px;
    display:flex;flex-direction:column;gap:7px;
    min-width:0;
  }
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
  .note-name{
    font-size:11px;font-weight:700;line-height:1.3;
    overflow:hidden;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;
    flex:1;
  }
  .timer{
    font-size:10px;font-weight:800;white-space:nowrap;
    text-align:right;flex-shrink:0;
  }
  .timer.urgent{animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .close-time{
    font-size:9px;color:var(--orange);
    background:#1e1800;border-radius:4px;
    padding:3px 6px;line-height:1.3;
  }
  .group-tag{
    font-size:9px;color:var(--muted);
    white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;
  }

  .divider{border:none;border-top:1px solid var(--border);margin:0}

  .bid-section{display:flex;flex-direction:column;gap:2px}
  .bid-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .bid-amount{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
  .bidder{font-size:10px;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ACTIONS */
  .actions{display:flex;gap:5px;margin-top:2px}
  .bid-btn{
    flex:1;background:var(--gold);color:var(--bg2);
    border:none;border-radius:6px;padding:7px 0;
    font-weight:700;font-size:11px;cursor:pointer;
  }
  .close-btn{
    background:none;color:var(--red);
    border:1px solid var(--red);border-radius:6px;
    padding:7px 8px;font-size:11px;font-weight:700;cursor:pointer;
    transition:all .2s;white-space:nowrap;
  }
  .close-btn.confirm{
    background:var(--red);color:#fff;
  }

  /* ENDED CARD */
  .won-tag{
    font-size:10px;color:var(--green);font-weight:600;
    padding:2px 0;
  }
  .del-btn{
    background:none;color:var(--dim);border:1px solid var(--border);
    border-radius:6px;padding:6px 8px;font-size:10px;cursor:pointer;
    width:100%;margin-top:2px;
  }

  /* MODAL */
  .overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.85);align-items:center;
    justify-content:center;z-index:100;padding:16px;
  }
  .overlay.open{display:flex}
  .modal-box{
    background:var(--card);border-radius:14px;padding:22px;
    width:100%;max-width:380px;border:1.5px solid var(--gold);
    display:flex;flex-direction:column;gap:13px;
  }
  .modal-title{font-size:17px;font-weight:800;color:var(--gold)}
  .modal-sub{font-size:13px;color:#aaa;line-height:1.4}
  .current-info{
    font-size:12px;color:var(--muted);
    background:var(--bg);padding:8px 12px;border-radius:6px;
  }
  .field-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:block}
  input[type=text],input[type=number],input[type=datetime-local]{
    background:var(--bg);border:1px solid #2a3e2c;
    border-radius:8px;padding:11px 13px;color:var(--text);
    font-size:14px;font-family:inherit;width:100%;outline:none;
  }
  input[type=datetime-local]{color-scheme:dark}
  input:focus{border-color:var(--gold)}
  .fixed-note{font-size:11px;color:var(--dim);text-align:center}
  .modal-actions{display:flex;gap:10px;margin-top:2px}
  .cancel-btn{
    flex:1;background:none;color:var(--muted);border:1px solid #333;
    border-radius:8px;padding:12px 0;font-weight:600;font-size:14px;cursor:pointer;
  }
  .confirm-btn{
    flex:1;background:var(--gold);color:var(--bg2);border:none;
    border-radius:8px;padding:12px 0;font-weight:700;font-size:14px;cursor:pointer;
  }

  /* PASSWORD GATE */
  #pwGate{
    position:fixed;inset:0;background:var(--bg2);
    display:flex;align-items:center;justify-content:center;
    z-index:999;padding:20px;
  }
  #pwGate.hidden{display:none}
  .pw-box{
    background:var(--card);border:1.5px solid var(--gold);
    border-radius:14px;padding:28px 24px;width:100%;max-width:340px;
    display:flex;flex-direction:column;gap:16px;text-align:center;
  }
  .pw-logo{font-size:22px;font-weight:800;color:var(--gold);letter-spacing:1px}
  .pw-sub{font-size:12px;color:var(--muted)}
  .pw-input{
    background:var(--bg);border:1px solid #2a3e2c;border-radius:8px;
    padding:13px 14px;color:var(--text);font-size:16px;
    font-family:inherit;width:100%;outline:none;text-align:center;
    letter-spacing:2px;
  }
  .pw-input:focus{border-color:var(--gold)}
  .pw-btn{
    background:var(--gold);color:var(--bg2);border:none;
    border-radius:8px;padding:13px 0;font-weight:700;
    font-size:15px;cursor:pointer;width:100%;
  }
  .pw-error{font-size:12px;color:var(--red);min-height:16px}

  /* TOAST */
  #toast{
    position:fixed;bottom:20px;left:50%;
    transform:translateX(-50%) translateY(70px);
    background:var(--gold);color:var(--bg2);
    padding:11px 22px;border-radius:30px;font-weight:700;
    font-size:13px;z-index:200;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
    transition:transform .25s ease;white-space:nowrap;
  }
  #toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pwGate">
  <div class="pw-box">
    <div class="pw-logo">⚡ LadzVault73</div>
    <div class="pw-sub">Auction Dashboard — Private Access</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Enter</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<header>
  <div>
    <div class="logo">⚡ LadzVault73</div>
    <div class="subtitle">Auction Dashboard</div>
  </div>
  <button id="newBtn">+ New Auction</button>
</header>

<div class="tabs">
  <button class="tab active" data-tab="active" id="tabActive">Active (0)</button>
  <button class="tab" data-tab="ended" id="tabEnded">Ended (0)</button>
</div>

<div id="statsBar">
  <div class="stat"><div class="stat-val" id="sActive">0</div><div class="stat-label">Active</div></div>
  <div class="stat"><div class="stat-val" id="sHighBid">—</div><div class="stat-label">Top Bid</div></div>
  <div class="stat"><div class="stat-val" id="sClosing">0</div><div class="stat-label">Closing &lt;2h</div></div>
  <div class="stat"><div class="stat-val" id="sEnded">0</div><div class="stat-label">Ended</div></div>
</div>

<div id="grid"></div>

<!-- NEW AUCTION MODAL -->
<div class="overlay" id="newModal">
  <div class="modal-box">
    <div class="modal-title">New Auction</div>
    <div>
      <label class="field-label">Note Description</label>
      <input type="text" id="nName" placeholder="e.g. 1990 $10 Disney Dollar Minnie">
    </div>
    <div>
      <label class="field-label">Facebook Group</label>
      <input type="text" id="nGroup" placeholder="Group name">
    </div>
    <div>
      <label class="field-label">Starting Bid ($)</label>
      <input type="number" id="nStart" placeholder="1.00" min="0" step="0.01">
    </div>
    <div>
      <label class="field-label">Fixed Close — Date & Time (default 3 days, 9 PM)</label>
      <input type="datetime-local" id="nEnd">
    </div>
    <div class="fixed-note">⏰ Fixed close — bids do not reset the clock</div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal('newModal')">Cancel</button>
      <button class="confirm-btn" onclick="createAuction()">Create</button>
    </div>
  </div>
</div>

<!-- BID MODAL -->
<div class="overlay" id="bidModal">
  <div class="modal-box">
    <div class="modal-title">Record New Bid</div>
    <div class="modal-sub" id="bidNoteName"></div>
    <div class="current-info" id="bidCurrentInfo"></div>
    <div>
      <label class="field-label">Bidder Name / FB Handle</label>
      <input type="text" id="bBidder" placeholder="e.g. Jane Smith">
    </div>
    <div>
      <label class="field-label">Bid Amount ($)</label>
      <input type="number" id="bAmount" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="fixed-note">⏰ Fixed end time — clock does not reset</div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal('bidModal')">Cancel</button>
      <button class="confirm-btn" onclick="recordBid()">Save Bid</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── PASSWORD GATE ──
// To change password: replace PASS_HASH with SHA-256 of your new password
// Generate at: https://emn178.github.io/online-tools/sha256.html
const PASS_HASH = '44e058a915a0d045b1d2097044b0f9dc24367b1ef57662e3ade91e5808253246';
const AUTH_KEY  = 'lv73-auth';

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPw(){
  const val = document.getElementById('pwInput').value;
  const hash = await sha256(val);
  if(hash === PASS_HASH){
    sessionStorage.setItem(AUTH_KEY,'1');
    document.getElementById('pwGate').classList.add('hidden');
    document.getElementById('pwError').textContent='';
  } else {
    document.getElementById('pwError').textContent='Incorrect password';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

function initAuth(){
  if(sessionStorage.getItem(AUTH_KEY)==='1'){
    document.getElementById('pwGate').classList.add('hidden');
  }
}
initAuth();

const STORAGE_KEY = 'ladzvault73-auctions-v3';
let auctions = [];
let currentView = 'active';
let activeBidId = null;
let tickInterval = null;
const confirmTimers = {};

// ── STORAGE ──
function load(){ try{ auctions=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }catch{ auctions=[]; } }
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(auctions)); }

// ── DEFAULT END TIME ──
function defaultEndTime(){
  const d=new Date();
  d.setDate(d.getDate()+3);
  d.setHours(21,0,0,0);
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T21:00`;
}

function formatEndTime(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+
    ' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

// ── UTILS ──
function fmt(n){ return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2}); }
function formatTime(ms){
  if(ms<=0) return 'CLOSED';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  if(h>=48){ return Math.floor(h/24)+'d '+( h%24)+'h'; }
  if(h>=1) return h+'h '+m+'m';
  return m+'m '+s+'s';
}
function urgencyColor(ms){
  if(ms<=0) return '#555';
  if(ms<2*3600000) return '#e05252';
  if(ms<6*3600000) return '#e8a838';
  return '#4caf72';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATS ──
function updateStats(){
  const active=auctions.filter(a=>a.status==='active');
  const ended=auctions.filter(a=>a.status==='ended');
  const closing=active.filter(a=>(a.auctionEndTime-Date.now())<2*3600000&&(a.auctionEndTime-Date.now())>0);
  const topBid=active.length?Math.max(...active.map(a=>a.currentBid)):null;
  document.getElementById('sActive').textContent=active.length;
  document.getElementById('sHighBid').textContent=topBid!==null?fmt(topBid):'—';
  document.getElementById('sClosing').textContent=closing.length;
  document.getElementById('sEnded').textContent=ended.length;
  document.getElementById('tabActive').textContent='Active ('+active.length+')';
  document.getElementById('tabEnded').textContent='Ended ('+ended.length+')';
}

// ── RENDER ──
function render(){
  updateStats();
  const active=auctions.filter(a=>a.status==='active').sort((a,b)=>a.auctionEndTime-b.auctionEndTime);
  const ended=auctions.filter(a=>a.status==='ended');
  const displayed=currentView==='active'?active:ended;
  const grid=document.getElementById('grid');

  if(!displayed.length){
    grid.innerHTML='<div class="empty">'+(currentView==='active'?'No active auctions. Tap "+ New Auction" to start.':'No ended auctions yet.')+'</div>';
    return;
  }

  grid.innerHTML=displayed.map(a=>{
    const ms=a.auctionEndTime-Date.now();
    const color=urgencyColor(ms);
    const urgent=ms<2*3600000&&ms>0;

    if(a.status==='ended'){
      return `
        <div class="card" style="border-color:#555" id="card-${a.id}">
          <div class="card-header">
            <div class="note-name">${esc(a.noteName)}</div>
            <div style="font-size:10px;color:#555;white-space:nowrap">🔒 CLOSED</div>
          </div>
          <div class="group-tag">📋 ${esc(a.group)}</div>
          <hr class="divider">
          <div class="won-tag">🏆 ${esc(a.currentBidder)}</div>
          <div class="bid-amount" style="font-size:18px">${fmt(a.currentBid)}</div>
          <button class="del-btn" onclick="deleteAuction('${a.id}')">Delete</button>
        </div>`;
    }

    return `
      <div class="card" style="border-color:${color}" id="card-${a.id}">
        <div class="card-header">
          <div class="note-name">${esc(a.noteName)}</div>
          <div class="timer${urgent?' urgent':''}" style="color:${color}">${ms<=0?'🔒':formatTime(ms)}</div>
        </div>
        <div class="close-time">📅 ${esc(formatEndTime(a.auctionEndTime))}</div>
        <div class="group-tag">📋 ${esc(a.group)}</div>
        <hr class="divider">
        <div class="bid-section">
          <div class="bid-label">High Bid</div>
          <div class="bid-amount">${fmt(a.currentBid)}</div>
          <div class="bidder">${esc(a.currentBidder)}</div>
        </div>
        <div class="actions">
          <button class="bid-btn" onclick="openBid('${a.id}')">Bid</button>
          <button class="close-btn" id="cbtn-${a.id}" onclick="handleClose('${a.id}')">Close</button>
        </div>
      </div>`;
  }).join('');
}

// ── TICK ──
function startTick(){
  if(tickInterval) clearInterval(tickInterval);
  tickInterval=setInterval(()=>{
    updateStats();
    auctions.filter(a=>a.status==='active').forEach(a=>{
      const ms=a.auctionEndTime-Date.now();
      const card=document.getElementById('card-'+a.id);
      if(!card) return;
      const t=card.querySelector('.timer');
      const color=urgencyColor(ms);
      if(t){ t.textContent=ms<=0?'🔒':formatTime(ms); t.style.color=color; t.classList.toggle('urgent',ms<2*3600000&&ms>0); }
      card.style.borderColor=color;
    });
  },1000);
}

// ── CREATE ──
document.getElementById('newBtn').addEventListener('click',()=>{
  document.getElementById('nName').value='';
  document.getElementById('nGroup').value='';
  document.getElementById('nStart').value='1';
  document.getElementById('nEnd').value=defaultEndTime();
  document.getElementById('newModal').classList.add('open');
});

function createAuction(){
  const name=document.getElementById('nName').value.trim();
  const group=document.getElementById('nGroup').value.trim();
  const start=parseFloat(document.getElementById('nStart').value);
  const endVal=document.getElementById('nEnd').value;
  if(!name||!group||isNaN(start)||!endVal){ showToast('Please fill all fields'); return; }
  const endTime=new Date(endVal).getTime();
  if(endTime<=Date.now()){ showToast('End time must be in the future'); return; }
  auctions.unshift({
    id:Date.now().toString(),noteName:name,group,
    startingBid:start,currentBid:start,
    currentBidder:'No bids yet',
    auctionEndTime:endTime,bids:[],status:'active'
  });
  save(); render(); startTick();
  closeModal('newModal');
  showToast('Created — closes '+formatEndTime(endTime));
}

// ── BID ──
function openBid(id){
  activeBidId=id;
  const a=auctions.find(x=>x.id===id);
  if(!a) return;
  document.getElementById('bidNoteName').textContent=a.noteName;
  document.getElementById('bidCurrentInfo').textContent=
    'Current: '+fmt(a.currentBid)+' — '+a.currentBidder+'\nCloses: '+formatEndTime(a.auctionEndTime);
  document.getElementById('bBidder').value='';
  document.getElementById('bAmount').value='';
  document.getElementById('bidModal').classList.add('open');
}

function recordBid(){
  const bidder=document.getElementById('bBidder').value.trim();
  const amount=parseFloat(document.getElementById('bAmount').value);
  if(!bidder||isNaN(amount)){ showToast('Fill in both fields'); return; }
  const idx=auctions.findIndex(a=>a.id===activeBidId);
  if(idx<0) return;
  const a=auctions[idx];
  if(amount<=a.currentBid&&a.bids.length>0){ showToast('Bid must exceed current high bid'); return; }
  auctions[idx]={...a,currentBid:amount,currentBidder:bidder,bids:[{bidder,amount,timestamp:Date.now()},...a.bids]};
  save(); render(); startTick();
  closeModal('bidModal');
  showToast(fmt(amount)+' by '+bidder);
}

// ── CLOSE (two-tap, no confirm dialog) ──
function handleClose(id){
  const btn=document.getElementById('cbtn-'+id);
  if(!btn) return;
  if(confirmTimers[id]){
    // Second tap — close auction
    clearTimeout(confirmTimers[id]);
    delete confirmTimers[id];
    const idx=auctions.findIndex(a=>a.id===id);
    if(idx<0) return;
    auctions[idx].status='ended';
    save(); render();
    showToast('Auction closed.');
  } else {
    // First tap — ask to confirm
    btn.textContent='Sure?';
    btn.classList.add('confirm');
    confirmTimers[id]=setTimeout(()=>{
      delete confirmTimers[id];
      if(btn){ btn.textContent='Close'; btn.classList.remove('confirm'); }
    },3000);
  }
}

function deleteAuction(id){
  auctions=auctions.filter(a=>a.id!==id);
  save(); render();
  showToast('Deleted.');
}

// ── MODALS ──
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); currentView=t.dataset.tab; render();
}));

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──
load(); render(); startTick();
</script>
</body>
</html>
