<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LadzVault73 — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F5820A;
    --orange-dark: #C96A00;
    --green: #2D5A1B;
    --green-light: #3D7A26;
    --dark: #0A0A0A;
    --dark2: #141414;
    --dark3: #1C1C1C;
    --steel: #8A8A8A;
    --white: #F0EDE8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--dark);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--dark2);
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 
      0 0 0 1px rgba(245,130,10,0.15),
      0 20px 60px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top accent bar */
  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--green), var(--orange), var(--green));
  }

  /* Corner bolts */
  .bolt {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #555, #222);
    border: 1px solid #333;
    z-index: 10;
  }
  .bolt-tl { top: 12px; left: 12px; }
  .bolt-tr { top: 12px; right: 12px; }
  .bolt-bl { bottom: 12px; left: 12px; }
  .bolt-br { bottom: 12px; right: 12px; }

  .logo-section {
    padding: 32px 24px 16px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-section img {
    width: 160px;
    height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 4px 20px rgba(245,130,10,0.4));
    animation: glow-pulse 3s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 4px 20px rgba(245,130,10,0.4)); }
    50% { filter: drop-shadow(0 4px 30px rgba(245,130,10,0.7)); }
  }

  .divider {
    height: 1px;
    margin: 0 24px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    opacity: 0.4;
  }

  .name-section {
    padding: 20px 28px 8px;
    text-align: center;
  }

  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    color: var(--white);
    line-height: 1;
  }

  .tagline {
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    margin-top: 4px;
    font-weight: 600;
  }

  .contact-section {
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--dark3);
    border: 1px solid #252525;
    border-left: 3px solid var(--orange);
    border-radius: 2px;
    text-decoration: none;
    color: var(--white);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .contact-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: rgba(245,130,10,0.06);
    transition: width 0.3s ease;
  }

  .contact-item:hover::before { width: 100%; }
  .contact-item:hover { border-left-color: var(--orange-dark); color: var(--orange); }

  .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .badges-section {
    padding: 4px 28px 24px;
  }

  .badges-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 10px;
    text-align: center;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .badge {
    padding: 4px 10px;
    border: 1px solid var(--green-light);
    border-radius: 2px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green-light);
    font-weight: 700;
    background: rgba(45,90,27,0.1);
  }

  .badge.sigma {
    border-color: var(--orange-dark);
    color: var(--orange);
    background: rgba(245,130,10,0.08);
  }

  .site-link {
    display: block;
    text-align: center;
    padding: 14px 28px 20px;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--steel);
    text-decoration: none;
    border-top: 1px solid #1e1e1e;
    transition: color 0.2s;
  }
  .site-link:hover { color: var(--orange); }
  .site-link span { color: var(--orange-dark); }

  .bottom-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--green), var(--orange), var(--green));
  }
</style>
</head>
